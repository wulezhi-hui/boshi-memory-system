# 动态压缩阈值配置
# 根据模型上下文长度自动选择最优压缩触发比例
# 修改此文件后新会话自动生效，无需重启Hermes

tiers:
  - max_context: 32768      # ≤32K上下文
    threshold: 0.80         # 80%时才压缩，尽量保留对话轮次

  - max_context: 131072     # ≤128K上下文
    threshold: 0.65         # 65%时压缩

  - max_context: 409600     # ≤400K上下文
    threshold: 0.50         # 50%时压缩（默认值）

  - max_context: 99999999   # >400K上下文（1M+等长上下文模型）
    threshold: 0.30         # 30%就压缩，早压缩省token
